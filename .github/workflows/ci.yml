name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  build-mcpb:
    name: Build .mcpb (sanity)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install mcpb CLI
        run: npm install -g @anthropic-ai/mcpb

      - name: Build Claude Desktop Extension
        run: npm run build:mcpb

      - name: Verify .mcpb artifact was produced
        run: |
          if ! ls *.mcpb >/dev/null 2>&1; then
            echo "::error::No .mcpb artifact found after build"
            exit 1
          fi
          ls -la *.mcpb
